<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e17">
  <title>PROTOCÔLE HORIZON | Mission Exploration</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  
  <link rel="apple-touch-icon" href="https://img.icons8.com/clouds/512/000000/nasa.png">
</head>
<body>
  <div id="app"></div>
  
  <script type="module" src="main.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker: Mission Active', reg))
          .catch(err => console.error('Service Worker: Mission Fail', err));
      });
    }
  </script>
</body>
</html>
